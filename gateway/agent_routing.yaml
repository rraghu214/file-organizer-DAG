# V8 agent → provider pinning. Map a skill name (the `agent` field on
# /v1/chat) to a preferred provider. Callers can override per-call.
#
# Session 8 student additions are at the bottom. The headline decision:
# sensitive_detector and classifier are pinned to a LOCAL provider
# (ollama, e.g. gemma) so that any prompt touching the user's files
# never leaves the machine. This is the privacy boundary expressed as
# routing config — no code change, just a pin.

planner: groq
researcher: gemini
distiller: gemini
summariser: gemini
critic: groq
formatter: nvidia
retriever: github
sandbox_executor: github
coder: groq
browser: gemini

# ── Session 8 student additions (file-organiser product) ─────────────────────
# Soft preferences (see gateway/main.py — preferred provider first, full
# failover chain active). Each distinct skill starts on a DIFFERENT provider
# so 5 concurrent parallel calls spread across the fleet from t=0:
#   classifier×N  → cerebras (3 calls; 2nd/3rd failover to gemini/groq)
#   sensitive_detector → nvidia  (starts on a different provider)
#   pattern_analyzer   → gemini  (starts on another different provider)
#
# In PRODUCTION: sensitive_detector and classifier → `ollama` for privacy.
#   ollama pull llama3.2:3b   (2 GB, ~3 s/call)
sensitive_detector: nvidia
classifier: cerebras
pattern_analyzer: gemini
